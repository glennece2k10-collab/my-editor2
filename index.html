<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeBin — Live Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --sans: system-ui, -apple-system, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg2: #27271f;
        --bg3: #111110;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.16);
        --text: #e8e6df;
        --text2: #a8a79f;
        --text3: #666560;
        --accent: #378ADD;
        --accent-light: #042C53;
      }
    }

    html, body { height: 100%; font-family: var(--sans); background: var(--bg3); color: var(--text); }

    .app { display: flex; flex-direction: column; height: 100vh; background: var(--bg3); }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px; height: 46px;
      background: var(--bg); border-bottom: 0.5px solid var(--border2);
      flex-shrink: 0; z-index: 10;
    }

    .logo { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.4px; padding-right: 12px; border-right: 0.5px solid var(--border); margin-right: 4px; }

    .tab-bar { display: flex; gap: 3px; }

    .tab { font-size: 12px; padding: 5px 12px; border-radius: var(--radius-md); cursor: pointer; color: var(--text2); border: 0.5px solid transparent; transition: all 0.12s; user-select: none; }
    .tab:hover { background: var(--bg2); color: var(--text); }
    .tab.active { background: var(--accent-light); color: var(--accent); border-color: var(--border); font-weight: 500; }

    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    .auto-label { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .auto-label input { cursor: pointer; accent-color: var(--accent); }

    .run-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.12s, transform 0.1s; }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:active { transform: scale(0.97); }
    .tri { width: 0; height: 0; border-style: solid; border-width: 4.5px 0 4.5px 8px; border-color: transparent transparent transparent #fff; display: inline-block; }

    /* ── Workspace ── */
    .workspace { display: flex; flex: 1; overflow: hidden; min-height: 0; width: 100%; }

    /* ── Editor column ── */
    .editors { display: flex; flex-direction: column; width: 380px; flex-shrink: 0; border-right: 0.5px solid var(--border2); min-width: 160px; min-height: 0; overflow: hidden; }

    .pane { display: flex; flex-direction: column; flex: 1; min-height: 0; border-bottom: 0.5px solid var(--border); }
    .pane:last-child { border-bottom: none; }
    .pane.collapsed { flex: 0 0 auto; }

    .pane-hdr { display: flex; align-items: center; justify-content: space-between; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text3); padding: 6px 12px; background: var(--bg2); border-bottom: 0.5px solid var(--border); flex-shrink: 0; cursor: pointer; user-select: none; }
    .pane-hdr:hover { color: var(--text2); }
    .collapse-icon { font-size: 10px; transition: transform 0.15s; }

    .editor { flex: 1; width: 100%; background: var(--bg); border: none; outline: none; font-family: var(--mono); font-size: 13px; line-height: 1.7; color: var(--text); padding: 12px 14px; resize: none; tab-size: 2; }
    .editor.hidden { display: none; }

    /* ── Resizer ── */
    .resizer { width: 4px; background: transparent; cursor: col-resize; flex-shrink: 0; transition: background 0.15s; }
    .resizer:hover, .resizer.dragging { background: var(--accent); }

    /* ── Right panel ── */
    .right-panel { display: flex; flex-direction: column; flex: 1; min-width: 0; min-height: 0; overflow: hidden; }

    /* ── Browser chrome ── */
    .browser-chrome { background: var(--bg2); border-bottom: 0.5px solid var(--border2); padding: 8px 12px 0; flex-shrink: 0; }

    .browser-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .dots { display: flex; gap: 5px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; cursor: default; }
    .dot-r { background: #E24B4A; }
    .dot-y { background: #EF9F27; }
    .dot-g { background: #1D9E75; }

    .nav-btns { display: flex; gap: 4px; }
    .nav-btn { width: 24px; height: 24px; border-radius: 5px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text3); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.12s; }
    .nav-btn:hover { color: var(--text2); }

    .url-bar { flex: 1; height: 28px; border-radius: 6px; border: 0.5px solid var(--border2); background: var(--bg); padding: 0 10px; display: flex; align-items: center; gap: 7px; min-width: 0; }
    .url-lock { width: 8px; height: 8px; border-radius: 1px; border: 1.5px solid #1D9E75; position: relative; flex-shrink: 0; }
    .url-lock::after { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 6px; height: 5px; border: 1.5px solid #1D9E75; border-radius: 3px 3px 0 0; border-bottom: none; }
    .url-text { font-size: 11px; font-family: var(--mono); color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .reload-icon { font-size: 14px; color: var(--text3); cursor: pointer; flex-shrink: 0; }
    .reload-icon:hover { color: var(--text); }

    .browser-tabs { display: flex; align-items: flex-end; gap: 2px; }
    .btab { font-size: 12px; padding: 5px 14px; background: var(--bg3); border: 0.5px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
    .btab.active-tab { background: var(--bg); color: var(--text); font-weight: 500; }
    .btab-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
    .btab-x { font-size: 10px; color: var(--text3); margin-left: 2px; line-height: 1; }
    .btab-x:hover { color: var(--text); }
    .new-tab { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text3); cursor: pointer; border-radius: 4px; margin-bottom: 1px; }
    .new-tab:hover { background: var(--bg); color: var(--text2); }

    /* ── View mode toggle ── */
    .view-toggle { display: flex; gap: 2px; margin-left: 6px; }
    .vbtn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 5px; border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; color: var(--text3); transition: all 0.12s; flex-shrink: 0; }
    .vbtn:hover { color: var(--text2); background: var(--bg2); }
    .vbtn.active { background: var(--accent-light); color: var(--accent); border-color: var(--border); }
    .vbtn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Preview wrapper ── */
    .preview-wrapper { flex: 1; min-height: 0; display: flex; align-items: stretch; justify-content: center; background: var(--bg3); overflow: auto; }
    .preview-wrapper.desktop { background: #fff; }
    .preview-wrapper.mobile { background: var(--bg3); padding: 16px 0; align-items: flex-start; justify-content: center; }

    /* ── Preview ── */
    .preview-frame { border: none; background: #fff; display: block; }
    .preview-wrapper.desktop .preview-frame { width: 100%; height: 100%; min-height: 0; flex: 1; }
    .preview-wrapper.mobile .preview-frame { width: 390px; min-width: 390px; height: 844px; border-radius: 14px; border: 6px solid #2C2C2A; box-shadow: 0 8px 32px rgba(0,0,0,0.25); flex-shrink: 0; }

    /* ── Console ── */
    .console-pane { height: 180px; border-top: 0.5px solid var(--border2); background: var(--bg); display: flex; flex-direction: column; flex-shrink: 0; }
    .console-pane.hidden { display: none; }

    .console-hdr { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text3); padding: 6px 12px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .con-clear { font-size: 11px; color: var(--text3); cursor: pointer; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .con-clear:hover { color: var(--text2); }

    .con-out { flex: 1; font-family: var(--mono); font-size: 12px; line-height: 1.65; padding: 8px 12px; overflow-y: auto; color: var(--text2); }
    .cline { padding: 1px 0; }
    .cline.log { color: var(--text2); }
    .cline.error { color: #E24B4A; }
    .cline.warn { color: #BA7517; }
    .cline.info { color: var(--accent); }

    /* ── Status bar ── */
    .statusbar { height: 24px; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 14px; flex-shrink: 0; }
    .st { font-size: 10px; color: var(--text3); }
    .st-ok { color: #1D9E75; }
    .st-err { color: #E24B4A; }

    kbd { font-family: var(--mono); font-size: 10px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 3px; padding: 1px 4px; color: var(--text3); }
  </style>
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">CodeBin</div>
    <div class="tab-bar">
      <div class="tab active" data-pane="html">HTML</div>
      <div class="tab active" data-pane="css">CSS</div>
      <div class="tab active" data-pane="js">JS</div>
      <div class="tab" id="con-toggle">Console</div>
    </div>
    <div class="topbar-right">
      <label class="auto-label">
        <input type="checkbox" id="auto-run" /> Auto-run
      </label>
      <button class="run-btn" id="run-btn">
        <span class="tri"></span> Run
      </button>
    </div>
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Editor column -->
    <div class="editors" id="editors">
      <div class="pane" id="pane-html">
        <div class="pane-hdr" data-collapse="html">
          <span>HTML</span>
          <span class="collapse-icon" id="ci-html">&#9660;</span>
        </div>
        <textarea class="editor" id="ed-html" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div class="pane" id="pane-css">
        <div class="pane-hdr" data-collapse="css">
          <span>CSS</span>
          <span class="collapse-icon" id="ci-css">&#9660;</span>
        </div>
        <textarea class="editor" id="ed-css" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="pane" id="pane-js">
        <div class="pane-hdr" data-collapse="js">
          <span>JS</span>
          <span class="collapse-icon" id="ci-js">&#9660;</span>
        </div>
        <textarea class="editor" id="ed-js" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>

    <!-- Drag resizer -->
    <div class="resizer" id="main-resizer"></div>

    <!-- Right panel: browser chrome + preview + console -->
    <div class="right-panel">

      <!-- Browser chrome -->
      <div class="browser-chrome">
        <div class="browser-bar">
          <div class="dots">
            <div class="dot dot-r" title="Close"></div>
            <div class="dot dot-y" title="Minimise"></div>
            <div class="dot dot-g" title="Maximise"></div>
          </div>
          <div class="nav-btns">
            <button class="nav-btn" id="back-btn" title="Back">&#8592;</button>
            <button class="nav-btn" id="fwd-btn" title="Forward">&#8594;</button>
          </div>
          <div class="url-bar">
            <div class="url-lock" title="Secure"></div>
            <span class="url-text" id="url-text">codebin://preview/index.html</span>
            <span class="reload-icon" id="reload-btn" title="Reload (Ctrl+Enter)">&#8635;</span>
          </div>
          <button class="run-btn" id="run-btn-2" style="font-size:12px;padding:4px 12px;">
            <span class="tri"></span> Run
          </button>
          <div class="view-toggle">
            <div class="vbtn active" id="vbtn-desktop" title="Desktop view">
              <svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="10" rx="1.5"/><path d="M5 14h6M8 12v2"/></svg>
            </div>
            <div class="vbtn" id="vbtn-mobile" title="Mobile view">
              <svg viewBox="0 0 16 16"><rect x="4" y="1" width="8" height="14" rx="2"/><circle cx="8" cy="12.5" r="0.8" fill="currentColor" stroke="none"/></svg>
            </div>
          </div>
        </div>
        <div class="browser-tabs">
          <div class="btab active-tab">
            <span class="btab-dot"></span>
            <span id="tab-title">Preview</span>
            <span class="btab-x">&#x2715;</span>
          </div>
          <div class="new-tab" title="New tab">+</div>
        </div>
      </div>

      <!-- Preview wrapper + iframe -->
      <div class="preview-wrapper desktop" id="preview-wrapper">
        <iframe class="preview-frame" id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-popups allow-forms allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-downloads"></iframe>
      </div>

      <!-- Console -->
      <div class="console-pane hidden" id="console-pane">
        <div class="console-hdr">
          Console
          <span class="con-clear" id="con-clear">clear</span>
        </div>
        <div class="con-out" id="con-out">
          <div class="cline info">&#8250; Console ready. Run your code to see output here.</div>
        </div>
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <span class="st st-ok" id="st-text">Ready</span>
        <span class="st" id="st-chars">0 chars</span>
        <span class="st" style="margin-left:auto;"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>
      </div>

    </div>
  </div>
</div>

<script>
  const edHtml = document.getElementById('ed-html');
  const edCss  = document.getElementById('ed-css');
  const edJs   = document.getElementById('ed-js');
  const preview = document.getElementById('preview');
  const runBtn  = document.getElementById('run-btn');
  const runBtn2 = document.getElementById('run-btn-2');
  const autoRunEl = document.getElementById('auto-run');
  const stText  = document.getElementById('st-text');
  const stChars = document.getElementById('st-chars');
  const conPane = document.getElementById('console-pane');
  const conOut  = document.getElementById('con-out');
  const conToggle = document.getElementById('con-toggle');
  const conClear  = document.getElementById('con-clear');
  const reloadBtn = document.getElementById('reload-btn');
  const editorsEl = document.getElementById('editors');
  const mainResizer = document.getElementById('main-resizer');

  // ── Starter code ──
  edHtml.value = `<div class="card">
  <h1>Hello, CodeBin!</h1>
  <p>Edit the HTML, CSS, and JS panes, then click <strong>Run</strong>.</p>
  <button onclick="greet()">Say Hello</button>
</div>`;

  edCss.value = `body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #f0f4f8;
}
.card {
  background: white;
  border-radius: 14px;
  padding: 2.5rem 3rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  text-align: center;
  max-width: 380px;
}
h1 {
  color: #185FA5;
  margin-bottom: 0.75rem;
  font-size: 1.75rem;
}
p {
  color: #555;
  line-height: 1.65;
  margin-bottom: 1.5rem;
}
button {
  background: #185FA5;
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s;
}
button:hover { background: #0c447c; }`;

  edJs.value = `function greet() {
  const names = ['World', 'Developer', 'Coder', 'Friend'];
  const pick = names[Math.floor(Math.random() * names.length)];
  alert('Hello, ' + pick + '!');
  console.log('Greeted:', pick);
}`;

  // ── State ──
  let conVisible = false;
  let arTimer = null;
  let pendingAlert = false;

  // ── Build & run ──
  function buildDoc() {
    const intercept = `(function(){
      var l=console.log.bind(console),e=console.error.bind(console),w=console.warn.bind(console),i=console.info.bind(console);
      function p(t,a){try{window.parent.postMessage({_cb:true,type:t,msg:Array.from(a).map(String).join(' ')},'*');}catch(x){}}
      console.log=function(){p('log',arguments);l.apply(console,arguments);};
      console.error=function(){p('error',arguments);e.apply(console,arguments);};
      console.warn=function(){p('warn',arguments);w.apply(console,arguments);};
      console.info=function(){p('info',arguments);i.apply(console,arguments);};
      window.addEventListener('error',function(ev){p('error',[ev.message+' (line '+ev.lineno+')']);});
    })();`;
    const html = edHtml.value;
    const css  = edCss.value;
    const js   = edJs.value;
    const cssBlock = css ? `<style>${css}</style>` : '';
    const jsBlock  = js
      ? `<script>${intercept}\ntry{\n${js}\n}catch(e){console.error(e.message)}<\/script>`
      : `<script>${intercept}<\/script>`;
    const resetCss = `<style>*,*::before,*::after{box-sizing:border-box;}html,body{margin:0;padding:0;width:100%;}spp-block-embed,spp-block-embed>*{display:block;width:100%!important;max-width:100%!important;}</style>`;
    return `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n${resetCss}\n${cssBlock}\n</head>\n<body>\n${html}\n${jsBlock}\n</body>\n</html>`;
  }

  function run() {
    preview.srcdoc = buildDoc();
    const total = edHtml.value.length + edCss.value.length + edJs.value.length;
    stChars.textContent = total.toLocaleString() + ' chars';
    stText.textContent = 'Ran at ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    stText.className = 'st st-ok';
  }

  runBtn.addEventListener('click', run);
  runBtn2.addEventListener('click', run);
  reloadBtn.addEventListener('click', run);

  // ── Auto-run ──
  [edHtml, edCss, edJs].forEach(el => {
    el.addEventListener('input', () => {
      if (!autoRunEl.checked) return;
      clearTimeout(arTimer);
      arTimer = setTimeout(run, 800);
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = el.selectionStart;
        el.value = el.value.substring(0, s) + '  ' + el.value.substring(el.selectionEnd);
        el.selectionStart = el.selectionEnd = s + 2;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        run();
      }
    });
  });

  // ── Console messages from iframe ──
  window.addEventListener('message', e => {
    if (!e.data || !e.data._cb) return;
    const line = document.createElement('div');
    line.className = 'cline ' + e.data.type;
    const pfx = { log: '›', error: '✕', warn: '⚠', info: 'ℹ' }[e.data.type] || '›';
    line.textContent = pfx + ' ' + e.data.msg;
    conOut.appendChild(line);
    conOut.scrollTop = conOut.scrollHeight;
    if (!conVisible && !pendingAlert) {
      pendingAlert = true;
      conToggle.style.fontWeight = '600';
      conToggle.style.color = e.data.type === 'error' ? '#E24B4A' : 'var(--accent)';
    }
  });

  // ── Console toggle ──
  conToggle.addEventListener('click', () => {
    conVisible = !conVisible;
    conPane.classList.toggle('hidden', !conVisible);
    conToggle.classList.toggle('active', conVisible);
    if (conVisible) {
      pendingAlert = false;
      conToggle.style.fontWeight = '';
      conToggle.style.color = '';
    }
  });

  conClear.addEventListener('click', () => { conOut.innerHTML = ''; });

  // ── Pane tab toggle (top bar) ──
  document.querySelectorAll('.tab[data-pane]').forEach(tab => {
    tab.addEventListener('click', () => {
      const paneEl = document.getElementById('pane-' + tab.dataset.pane);
      const edEl   = document.getElementById('ed-'   + tab.dataset.pane);
      if (!paneEl || !edEl) return;
      const hiding = !edEl.classList.contains('hidden');
      edEl.classList.toggle('hidden', hiding);
      paneEl.classList.toggle('collapsed', hiding);
      tab.classList.toggle('active', !hiding);
      const ci = document.getElementById('ci-' + tab.dataset.pane);
      if (ci) ci.innerHTML = hiding ? '&#9654;' : '&#9660;';
    });
  });

  // ── Pane collapse via header arrow ──
  document.querySelectorAll('[data-collapse]').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const key = hdr.dataset.collapse;
      const edEl   = document.getElementById('ed-'   + key);
      const paneEl = document.getElementById('pane-' + key);
      const ci     = document.getElementById('ci-'   + key);
      const tabEl  = document.querySelector('.tab[data-pane="' + key + '"]');
      const hiding = !edEl.classList.contains('hidden');
      edEl.classList.toggle('hidden', hiding);
      paneEl.classList.toggle('collapsed', hiding);
      if (ci) ci.innerHTML = hiding ? '&#9654;' : '&#9660;';
      if (tabEl) tabEl.classList.toggle('active', !hiding);
    });
  });

  // ── Drag-to-resize editor column ──
  let startX, startW;
  mainResizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = editorsEl.getBoundingClientRect().width;
    mainResizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = ev => {
      const newW = Math.max(160, Math.min(window.innerWidth * 0.7, startW + ev.clientX - startX));
      editorsEl.style.width = newW + 'px';
    };
    const onUp = () => {
      mainResizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });

  // ── Open in new tab ──
  document.querySelector('.new-tab').addEventListener('click', () => {
    const blob = new Blob([buildDoc()], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  });

  // ── View mode toggle ──
  const previewWrapper = document.getElementById('preview-wrapper');
  const vbtnDesktop = document.getElementById('vbtn-desktop');
  const vbtnMobile  = document.getElementById('vbtn-mobile');

  vbtnDesktop.addEventListener('click', () => {
    previewWrapper.className = 'preview-wrapper desktop';
    vbtnDesktop.classList.add('active');
    vbtnMobile.classList.remove('active');
  });

  vbtnMobile.addEventListener('click', () => {
    previewWrapper.className = 'preview-wrapper mobile';
    vbtnMobile.classList.add('active');
    vbtnDesktop.classList.remove('active');
  });

  // ── Initial run ──
  run();
</script>
</body>
</html>
